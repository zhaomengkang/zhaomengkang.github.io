<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANUC Robot Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f9f9f9;
        }

        .tree {
            list-style: none;
            padding-left: 0;
            margin: 0;
            max-width: 500px;
        }

        .tree li {
            margin: 6px 0;
            position: relative;
        }

        .tree details {
            margin-left: 0;
        }

        .tree summary {
            cursor: pointer;
            font-weight: bold;
            outline: none;
        }

        .tree summary::-webkit-details-marker {
            display: none;
        }

        .tree summary::before {
            content: "+ ";
            font-weight: bold;
            color: #333;
        }

        .tree details[open] > summary::before {
            content: "− ";
        }

        .tree .child {
            padding-left: 24px;
            margin-top: 6px;
        }

        .link-item {
            padding-left: 24px;
            display: block;
            color: #0078d7;
            text-decoration: none;
            cursor: pointer;
        }

        .link-item:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<ul class="tree">
    <li>
        <details>
            <summary>FANUC Robot</summary>
            <ul class="child">
                <li>
                    <details>
                        <summary>Document</summary>
                        <a class="link-item" href="https://zhaomengkang.github.io/FANUC-Robot-Manual/Manual/eDoc/R-30iB%20Plus/welcome.htm" target="_blank">
                            R-30iB Plus eDoc
                        </a>
                    </details>
                </li>
            </ul>
        </details>
    </li>
</ul>

</body>
</html>
